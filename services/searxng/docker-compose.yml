services:
  searxng:
    image: searxng/searxng:latest
    container_name: tpm-searxng
    ports:
      - "8888:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
      - searxng-data:/var/cache/searxng
    environment:
      - BASE_URL=http://localhost:8888/
      - INSTANCE_NAME=tpm_searxng
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - tpm-net

  redis:
    image: redis:alpine
    container_name: tpm-searxng-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    networks:
      - tpm-net

networks:
  tpm-net:
    driver: bridge

volumes:
  searxng-data:
