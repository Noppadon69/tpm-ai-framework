services:
  langfuse-db:
    image: postgres:15-alpine
    container_name: tpm-langfuse-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse_local_dev
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse_db:/var/lib/postgresql/data
    networks:
      - tpm-net

  langfuse:
    image: langfuse/langfuse:2
    container_name: tpm-langfuse
    restart: unless-stopped
    depends_on:
      - langfuse-db
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse_local_dev@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=tpm_local_dev_secret_change_in_prod
      - SALT=tpm_local_dev_salt_change_in_prod
      - NEXTAUTH_URL=http://localhost:3000
      - TELEMETRY_ENABLED=false
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=false
    networks:
      - tpm-net

volumes:
  langfuse_db:

networks:
  tpm-net:
    external: false
