services:
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: tpm-phoenix
    restart: unless-stopped
    ports:
      - "6006:6006"
      - "4317:4317"
    environment:
      - PHOENIX_WORKING_DIR=/mnt/phoenix
    volumes:
      - phoenix_data:/mnt/phoenix
    networks:
      - tpm-net

volumes:
  phoenix_data:

networks:
  tpm-net:
    external: false
